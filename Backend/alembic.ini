# Alembic configuration file
[alembic]
script_location = alembic
prepend_sys_path = .
# This will be set dynamically in env.py from DATABASE_URL environment variable
revision_environment = true

# Sequential migration file naming: e.g. 0001_add_users, 0002_add_posts
# %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d = timestamp
# Using rev prefix for sequential-style naming
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
